name: Yongin public sports alert

"on":
  workflow_dispatch:
  schedule:
    - cron: "13,43 * * * *"

permissions:
  contents: write

concurrency:
  group: yongin-publicsports-alert
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Crawl reservation slots
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YONGIN_COOKIE: ${{ secrets.YONGIN_COOKIE }}
        run: node scripts/crawl-yongin.js

      - name: Persist notification state
        if: success()
        run: |
          if [ -n "$(git status --porcelain .state/yongin-notified.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .state/yongin-notified.json
            git commit -m "Update Yongin notification state"
            git push
          fi
